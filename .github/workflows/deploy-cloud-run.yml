# =============================================================================
# REUSABLE WORKFLOW: DEPLOY CLOUD RUN
# =============================================================================
# Two modes, determined by the `version` input:
#
#   version=""     -> STAGING: build from source, push to AR, deploy
#   version="v1.x" -> PRODUCTION: retag stg-latest in AR, deploy
#
# Centralized AR: same repository for stg and pro (e.g. dogfy-host/docker).
# No cross-project image copy needed — promote is just a tag operation.
#
# Destination: Dogfy-Diet/.github/.github/workflows/deploy-cloud-run.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO      (e.g. europe-west1-docker.pkg.dev/dogfy-host/docker)
#   Per environment  : GCP_PROJECT  (e.g. dogfy-platform-stg / dogfy-platform-pro)
#                      SA_EMAIL     (deployer SA for this service)
#                      WIF_PROVIDER (WIF provider full resource name)
#
# Infra prerequisites:
#   - Deployer SA needs roles/artifactregistry.writer on the AR_REPO project.
#   - Cloud Run service agent needs roles/artifactregistry.reader on AR_REPO project.
#   - Terraform owns all Cloud Run config; CI/CD only deploys images.
# =============================================================================
name: Deploy Cloud Run

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "GitHub environment (stg or production)"
      service:
        required: true
        type: string
        description: "Cloud Run service name (must match Terraform)"
      version:
        type: string
        default: ""
        description: "Semver tag for production promote (e.g. v1.4.0). Empty = build from source."
      region:
        type: string
        default: "europe-west1"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      build_args:
        type: string
        default: ""
      node_version:
        type: string
        default: ""
      install_command:
        type: string
        default: ""
      build_command:
        type: string
        default: ""
      smoke_test_path:
        type: string
        default: ""
        description: "Health check path (e.g. /api/health). Empty = skip."
      cdn_host:
        type: string
        default: ""
        description: "Host to invalidate CDN cache for (e.g. bo-mig.staging.dogfydiet.com). Requires CDN_URL_MAP GitHub env variable. Empty = skip."
    outputs:
      image:
        value: ${{ jobs.deploy.outputs.image }}
      url:
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    name: "Deploy to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.service }}-${{ inputs.environment }}
      cancel-in-progress: false
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      url: ${{ steps.url.outputs.url }}
    permissions:
      contents: read
      id-token: write

    steps:
      # ================================================================
      # SOURCE & PREBUILD (staging only — production skips all of this)
      # ================================================================
      - uses: actions/checkout@v4
        if: inputs.version == ''

      - uses: actions/setup-node@v4
        if: inputs.version == '' && inputs.node_version != ''
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - if: inputs.version == '' && inputs.install_command != ''
        run: ${{ inputs.install_command }}

      - if: inputs.version == '' && inputs.build_command != ''
        run: ${{ inputs.build_command }}

      # ================================================================
      # AUTH (both staging and production)
      # ================================================================
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - if: inputs.version == ''
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      # ================================================================
      # BUILD (staging: version is empty)
      # ================================================================
      - uses: docker/setup-buildx-action@v3
        if: inputs.version == ''

      - id: meta
        if: inputs.version == ''
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & Push
        if: inputs.version == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ vars.AR_REPO }}/${{ inputs.service }}:sha-${{ steps.meta.outputs.sha_short }}
            ${{ vars.AR_REPO }}/${{ inputs.service }}:stg-latest
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # ================================================================
      # PROMOTE (production: version is set)
      # Same AR repo — just retag, no image copy needed.
      # ================================================================
      - name: Promote image
        if: inputs.version != ''
        run: |
          gcloud artifacts docker tags add \
            "${{ vars.AR_REPO }}/${{ inputs.service }}:stg-latest" \
            "${{ vars.AR_REPO }}/${{ inputs.service }}:${{ inputs.version }}"
          gcloud artifacts docker tags add \
            "${{ vars.AR_REPO }}/${{ inputs.service }}:stg-latest" \
            "${{ vars.AR_REPO }}/${{ inputs.service }}:pro-latest"

      # ================================================================
      # SAVE CURRENT REVISION (for auto-rollback if smoke test fails)
      # ================================================================
      - name: Save current revision
        id: pre-deploy
        run: |
          REVISION=$(gcloud run revisions list \
            --service=${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='value(name)' --limit=1 --sort-by='~creationTimestamp' 2>/dev/null || true)
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"

      # ================================================================
      # RESOLVE IMAGE & DEPLOY
      # ================================================================
      - name: Resolve image
        id: resolve
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "image=${{ vars.AR_REPO }}/${{ inputs.service }}:${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ vars.AR_REPO }}/${{ inputs.service }}:sha-${{ steps.meta.outputs.sha_short }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service }} \
            --image=${{ steps.resolve.outputs.image }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      # ================================================================
      # CLEANUP PREVIEWS (staging only — remove stale pr-* traffic tags)
      # ================================================================
      - name: Cleanup preview tags
        if: inputs.environment == 'stg'
        run: |
          TAGS=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} \
            --format='value(status.traffic.tag)' 2>/dev/null \
            | tr ';' '\n' | grep "^pr-" || true)
          for TAG in $TAGS; do
            echo "Removing traffic tag: $TAG"
            gcloud run services update-traffic ${{ inputs.service }} \
              --remove-tags="$TAG" \
              --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} || true
          done

      # ================================================================
      # SMOKE TEST
      # ================================================================
      - name: Smoke test
        id: smoke
        if: inputs.smoke_test_path != ''
        run: |
          URL="${{ steps.url.outputs.url }}${{ inputs.smoke_test_path }}"
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "Smoke test FAILED after 3 attempts"
          exit 1

      # ================================================================
      # AUTO-ROLLBACK (if smoke test failed and there was a previous revision)
      # ================================================================
      - name: Auto-rollback
        if: failure() && steps.smoke.outcome == 'failure' && steps.pre-deploy.outputs.revision != ''
        run: |
          echo "::warning::Smoke test failed — rolling back to ${{ steps.pre-deploy.outputs.revision }}"
          gcloud run services update-traffic ${{ inputs.service }} \
            --to-revisions=${{ steps.pre-deploy.outputs.revision }}=100 \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      # ================================================================
      # CDN INVALIDATION
      # ================================================================
      - name: Invalidate CDN cache
        if: inputs.cdn_host != '' && vars.CDN_URL_MAP != ''
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --host="${{ inputs.cdn_host }}" \
            --path="/*" \
            --project=${{ vars.GCP_PROJECT }} \
            --async

      # ================================================================
      # SUMMARY
      # ================================================================
      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Deploy: ${{ inputs.service }} → ${{ inputs.environment }}
          | | |
          |---|---|
          | Image | `${{ steps.resolve.outputs.image }}` |
          | URL | ${{ steps.url.outputs.url }} |
          | Version | ${{ inputs.version || 'staging' }} |
          | CDN Invalidation | ${{ inputs.cdn_host || 'skipped' }} |
          EOF
