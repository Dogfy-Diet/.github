# =============================================================================
# REUSABLE WORKFLOW: DEPLOY CLOUD RUN (STAGING)
# =============================================================================
# Builds from source, pushes to AR, and deploys to Cloud Run.
# Used for staging deployments triggered by pushes to main.
#
# For production promotes, use promote-cloud-run.yml instead.
#
# Centralized AR: images are pushed to dogfy-host/docker.
# Tags created: sha-<7chars> (immutable) + stg-latest (mutable).
#
# Destination: Dogfy-Diet/.github/.github/workflows/deploy-cloud-run.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO      (e.g. europe-west1-docker.pkg.dev/dogfy-host/docker)
#   Per environment  : GCP_PROJECT  (e.g. dogfy-platform-stg)
#                      SA_EMAIL     (deployer SA for this service)
#                      WIF_PROVIDER (WIF provider full resource name)
#
# Infra prerequisites:
#   - Deployer SA needs roles/artifactregistry.writer on the AR_REPO project.
#   - Cloud Run service agent needs roles/artifactregistry.reader on AR_REPO project.
#   - Terraform owns all Cloud Run config; CI/CD only deploys images.
# =============================================================================
name: Deploy Cloud Run

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "GitHub environment (e.g. stg)"
      service:
        required: true
        type: string
        description: "Cloud Run service name (must match Terraform)"
      region:
        type: string
        default: "europe-west1"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      build_args:
        type: string
        default: ""
      node_version:
        type: string
        default: ""
      install_command:
        type: string
        default: ""
      build_command:
        type: string
        default: ""
      smoke_test_path:
        type: string
        default: ""
        description: "Health check path (e.g. /api/health). Empty = skip."
      cdn_host:
        type: string
        default: ""
        description: "Host to invalidate CDN cache for. Requires CDN_URL_MAP GitHub env variable. Empty = skip."
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email. For monorepos with multiple services. Defaults to vars.SA_EMAIL if empty."
      submodules:
        type: string
        default: "false"
        description: "Fetch git submodules on checkout. 'true', 'recursive', or 'false'. For private submodules, also pass submodules_token."
      cache_node_modules:
        type: boolean
        default: true
        description: "Cache node_modules across runs (key = package-lock.json hash). Ignored if install_command is empty."
      build_cache_path:
        type: string
        default: ""
        description: "Directory to cache across runs for incremental builds (e.g. 'apps/website/.nuxt'). Keyed by service + sha with restore-keys fallback. Empty = no build cache."
      env_vars:
        type: string
        default: ""
        description: |
          Multiline KEY=VALUE env vars exposed to the install/build steps
          (before docker build). App-specific — common use case is stub
          values required by Nuxt plugin init during `nuxt build`.
    secrets:
      submodules_token:
        required: false
        description: "PAT with read access to private submodule repos. Only needed when submodules live in private repos the GITHUB_TOKEN cannot reach."
    outputs:
      image:
        value: ${{ jobs.deploy.outputs.image }}
      digest:
        value: ${{ jobs.deploy.outputs.digest }}
      url:
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    name: "Deploy to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.service }}-${{ inputs.environment }}
      cancel-in-progress: false
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      digest: ${{ steps.resolve.outputs.digest }}
      url: ${{ steps.url.outputs.url }}
    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:
      # ================================================================
      # SOURCE & PREBUILD
      # ================================================================
      - uses: actions/checkout@v4

      # Fetch private submodules separately so the main checkout keeps using
      # GITHUB_TOKEN (scoped to this repo) and the PAT only authorizes the
      # submodule fetch.
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf

      - uses: actions/setup-node@v4
        if: inputs.node_version != ''
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Restore node_modules cache
        if: inputs.install_command != '' && inputs.cache_node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.service }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.service }}-

      - name: Load app-specific env vars
        if: inputs.env_vars != ''
        run: |
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            case "$line" in \#*) continue ;; esac
            echo "$line" >> "$GITHUB_ENV"
          done <<< "${{ inputs.env_vars }}"

      - if: inputs.install_command != ''
        run: ${{ inputs.install_command }}

      # Build cache is keyed strictly by commit SHA with NO restore-keys
      # fallback. A fallback match from a different SHA restored stale Nuxt
      # .nuxt/dist chunks that didn't get re-emitted on incremental builds
      # (observed with lang JSON changes baked into cached i18n chunks).
      # Cold build on first run of a SHA is a fair trade for correctness.
      - name: Restore build cache
        if: inputs.build_cache_path != ''
        uses: actions/cache@v4
        with:
          path: ${{ inputs.build_cache_path }}
          key: ${{ runner.os }}-build-${{ inputs.service }}-${{ github.sha }}

      - if: inputs.build_command != ''
        env:
          # Exposed for builds that need to fetch private resources (e.g.
          # @nuxt/content's repository source pulling a private submodule).
          # Reuses the same PAT the caller passes via `submodules_token`.
          GITHUB_API_TOKEN: ${{ secrets.submodules_token }}
        run: ${{ inputs.build_command }}

      # ================================================================
      # AUTH
      # ================================================================
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      # ================================================================
      # BUILD & PUSH
      # ================================================================
      - id: meta
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # ================================================================
      # PREVIEW-IMAGE REUSE
      # On a squash-merge from a PR, the last preview build already pushed
      # a pr-<N> tag to AR against the exact same tree. Re-using that
      # digest lets us skip the ~5 min rebuild. Safety: we only reuse when
      # the merge commit's tree hash equals the PR head's tree hash, which
      # is exactly the case for a squash that hasn't picked up main drift.
      # Any mismatch → fall through to a fresh build.
      # ================================================================
      - name: Check for reusable preview image
        id: preview-reuse
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use --jq directly (re-piping gh output through jq fails on
          # embedded control chars in large response bodies).
          PR_INFO=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] | "\(.number)\t\(.head.sha)"' 2>/dev/null || true)
          if [ -z "$PR_INFO" ]; then
            echo "reuse=false" >> "$GITHUB_OUTPUT"
            echo "No PR associated with commit ${{ github.sha }}"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_INFO" | cut -f1)
          PR_HEAD_SHA=$(echo "$PR_INFO" | cut -f2)

          if [ -z "$PR_NUMBER" ] || [ -z "$PR_HEAD_SHA" ]; then
            echo "reuse=false" >> "$GITHUB_OUTPUT"
            echo "PR response missing number or head.sha"
            exit 0
          fi

          # Read tree hashes from the API — this works even if the PR
          # branch has been deleted (the commit and its tree stay
          # reachable by SHA).
          MERGE_TREE=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
            --jq '.commit.tree.sha' 2>/dev/null || true)
          PR_HEAD_TREE=$(gh api "repos/${{ github.repository }}/commits/${PR_HEAD_SHA}" \
            --jq '.commit.tree.sha' 2>/dev/null || true)

          if [ -z "$MERGE_TREE" ] || [ -z "$PR_HEAD_TREE" ] || [ "$MERGE_TREE" != "$PR_HEAD_TREE" ]; then
            echo "reuse=false" >> "$GITHUB_OUTPUT"
            echo "Tree mismatch or unavailable (merge=${MERGE_TREE:-<missing>} pr_head=${PR_HEAD_TREE:-<missing>}) — building fresh"
            exit 0
          fi

          AR_IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"
          DIGEST=$(gcloud artifacts docker images describe \
            "${AR_IMAGE}:pr-${PR_NUMBER}" \
            --format='value(image_summary.digest)' 2>/dev/null || true)

          if [ -z "$DIGEST" ]; then
            echo "reuse=false" >> "$GITHUB_OUTPUT"
            echo "pr-${PR_NUMBER} tag not found in AR — building fresh"
            exit 0
          fi

          echo "reuse=true" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "✓ Reusing preview image from PR #${PR_NUMBER} (${DIGEST})"

      - uses: docker/setup-buildx-action@v3
        if: steps.preview-reuse.outputs.reuse != 'true'

      - name: Build & Push
        id: build
        if: steps.preview-reuse.outputs.reuse != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ vars.AR_REPO }}/${{ inputs.service }}:sha-${{ steps.meta.outputs.sha_short }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=registry,ref=${{ vars.AR_REPO }}/${{ inputs.service }}:buildcache
          cache-to: type=registry,ref=${{ vars.AR_REPO }}/${{ inputs.service }}:buildcache,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Retag preview digest as sha-<merge>
        if: steps.preview-reuse.outputs.reuse == 'true'
        run: |
          AR_IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"
          DIGEST="${{ steps.preview-reuse.outputs.digest }}"
          echo "Aliasing ${DIGEST} as sha-${{ steps.meta.outputs.sha_short }}"
          gcloud artifacts docker tags add \
            "${AR_IMAGE}@${DIGEST}" \
            "${AR_IMAGE}:sha-${{ steps.meta.outputs.sha_short }}" \
            --quiet

      # ================================================================
      # SAVE CURRENT REVISION (for auto-rollback if smoke test fails)
      # Use the revision currently serving 100% of traffic, NOT just
      # the most-recently-created one — preview deploys (pr-* tags,
      # --no-traffic) create revisions that are the newest but don't
      # receive traffic, so rolling back to them would be a no-op.
      # ================================================================
      - name: Save current revision
        id: pre-deploy
        run: |
          REVISION=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='json' 2>/dev/null \
            | jq -r '.status.traffic[] | select(.percent==100 and (.tag == null or .tag == "")) | .revisionName' \
            | head -1 || true)
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"

      # ================================================================
      # RESOLVE IMAGE & DEPLOY
      # ================================================================
      - name: Resolve image
        id: resolve
        run: |
          if [ "${{ steps.preview-reuse.outputs.reuse }}" = "true" ]; then
            DIGEST="${{ steps.preview-reuse.outputs.digest }}"
          else
            DIGEST="${{ steps.build.outputs.digest }}"
          fi
          echo "image=${{ vars.AR_REPO }}/${{ inputs.service }}:sha-${{ steps.meta.outputs.sha_short }}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service }} \
            --image=${{ vars.AR_REPO }}/${{ inputs.service }}@${{ steps.resolve.outputs.digest }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Route traffic to latest revision
        # `gcloud run deploy` does NOT shift traffic when an explicit split
        # is already pinned on the service — which is the exact state the
        # auto-rollback step below leaves behind. `update-traffic --to-latest`
        # re-routes 100% to whatever revision was just deployed, undoing any
        # prior pin. Idempotent when traffic is already on latest.
        run: |
          gcloud run services update-traffic ${{ inputs.service }} \
            --to-latest \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Get service URL
        id: url
        run: |
          if [ -n "${{ inputs.cdn_host }}" ]; then
            echo "url=https://${{ inputs.cdn_host }}" >> "$GITHUB_OUTPUT"
          else
            URL=$(gcloud run services describe ${{ inputs.service }} \
              --region=${{ inputs.region }} \
              --project=${{ vars.GCP_PROJECT }} \
              --format='value(status.url)')
            echo "url=${URL}" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # CLEANUP PREVIEWS (remove stale pr-* traffic tags)
      # ================================================================
      - name: Cleanup preview tags
        run: |
          TAGS=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} \
            --format='value(status.traffic.tag)' 2>/dev/null \
            | tr ';' '\n' | grep "^pr-" || true)
          for TAG in $TAGS; do
            echo "Removing traffic tag: $TAG"
            gcloud run services update-traffic ${{ inputs.service }} \
              --remove-tags="$TAG" \
              --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} || true
          done

      # ================================================================
      # SMOKE TEST
      # ================================================================
      - name: Smoke test
        id: smoke
        if: inputs.smoke_test_path != ''
        run: |
          URL="${{ steps.url.outputs.url }}${{ inputs.smoke_test_path }}"
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "Smoke test FAILED after 3 attempts"
          exit 1

      # ================================================================
      # AUTO-ROLLBACK (if smoke test failed and there was a previous revision)
      # ================================================================
      - name: Auto-rollback
        if: failure() && steps.smoke.outcome == 'failure' && steps.pre-deploy.outputs.revision != ''
        run: |
          echo "::warning::Smoke test failed — rolling back to ${{ steps.pre-deploy.outputs.revision }}"
          gcloud run services update-traffic ${{ inputs.service }} \
            --to-revisions=${{ steps.pre-deploy.outputs.revision }}=100 \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      # ================================================================
      # MOVE stg-latest TAG — only after deploy + smoke success so a
      # failed deploy doesn't leave stg-latest pointing at a broken digest.
      # Same atomic-tag-move pattern as promote-cloud-run.yml.
      # ================================================================
      - name: Move stg-latest tag
        if: success()
        run: |
          AR_IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"
          DIGEST="${{ steps.resolve.outputs.digest }}"
          echo "Moving stg-latest → ${DIGEST}"
          gcloud artifacts docker tags add \
            "${AR_IMAGE}@${DIGEST}" \
            "${AR_IMAGE}:stg-latest" \
            --quiet

      # ================================================================
      # RECORD PREVIOUS-REVISION — service-level annotation that the
      # rollback-previous workflow reads to find the correct rollback
      # target, bypassing the newest-non-current walker which can land
      # on revisions left behind by failed deploys.
      # Service-level annotations do not create new revisions.
      # ================================================================
      - name: Record previous-revision annotation
        if: success() && steps.pre-deploy.outputs.revision != ''
        run: |
          gcloud run services update ${{ inputs.service }} \
            --update-annotations="dogfydiet.com/previous-revision=${{ steps.pre-deploy.outputs.revision }}" \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --quiet

      # ================================================================
      # CDN INVALIDATION — only on success so a rolled-back service
      # doesn't flush its cache (which would serve cold from the
      # previous revision with no improvement to users).
      # ================================================================
      - name: Invalidate CDN cache
        if: success() && inputs.cdn_host != '' && vars.CDN_URL_MAP != ''
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --host="${{ inputs.cdn_host }}" \
            --path="/*" \
            --project=${{ vars.GCP_PROJECT }} \
            --async

      # ================================================================
      # REGISTER GITHUB DEPLOYMENT
      # ================================================================
      - name: Register deployment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.sha }}
          ENVIRONMENT: ${{ inputs.environment }}
          DESCRIPTION: "${{ inputs.service }} ${{ steps.resolve.outputs.image }}"
          ENVIRONMENT_URL: ${{ steps.url.outputs.url }}
        run: |
          # required_contexts: [] — don't gate the deployment record on
          # commit status checks. gh api's -f/-F can't encode an empty
          # JSON array, so we feed the body via --input from jq.
          DEPLOY_ID=$(jq -n \
            --arg ref "$REF" \
            --arg env "$ENVIRONMENT" \
            --arg desc "$DESCRIPTION" \
            '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}' \
            | gh api repos/${{ github.repository }}/deployments --input - --jq '.id')
          gh api repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses \
            -f state=success \
            -f environment_url="$ENVIRONMENT_URL" \
            -f description="Deployed ${{ steps.resolve.outputs.image }}"

      # ================================================================
      # SUMMARY
      # ================================================================
      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Deploy: ${{ inputs.service }} → ${{ inputs.environment }}
          | | |
          |---|---|
          | Image | `${{ steps.resolve.outputs.image }}` |
          | Digest | `${{ steps.resolve.outputs.digest }}` |
          | URL | ${{ steps.url.outputs.url }} |
          | CDN Invalidation | ${{ inputs.cdn_host || 'skipped' }} |
          EOF
