# =============================================================================
# REUSABLE WORKFLOW: ROLLBACK CLOUD RUN
# =============================================================================
# Deploys a previous version by tag (e.g. v1.3.2) from the centralized AR.
# Protected by the "production" GitHub environment (approval gate).
#
# Destination: Dogfy-Diet/.github/.github/workflows/rollback-cloud-run.yml
#
# Required GitHub variables:
#   Repository level       : AR_REPO
#   Environment "production": GCP_PROJECT, SA_EMAIL, WIF_PROVIDER
# =============================================================================
name: Rollback Cloud Run

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string
        description: "Version to rollback to (e.g. v1.3.2)"
      region:
        type: string
        default: "europe-west1"
      smoke_test_path:
        type: string
        default: ""
      cdn_host:
        type: string
        default: ""
        description: "Host to invalidate CDN cache for. Requires CDN_URL_MAP GitHub env variable. Empty = skip."
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email. For monorepos with multiple services. Defaults to vars.SA_EMAIL if empty."

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-${{ inputs.service }}-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify version exists in AR
        run: |
          IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}:${{ inputs.version }}"
          echo "Checking $IMAGE ..."
          gcloud artifacts docker images describe "$IMAGE" \
            --format='value(image_summary.digest)' > /dev/null || {
            echo "::error::Version ${{ inputs.version }} not found in Artifact Registry"
            exit 1
          }
          echo "Found: $IMAGE"

      - name: Rollback
        run: |
          IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}:${{ inputs.version }}"
          echo "Rolling back to: $IMAGE"
          gcloud run deploy ${{ inputs.service }} \
            --image="$IMAGE" \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Smoke test
        if: inputs.smoke_test_path != ''
        run: |
          URL=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} \
            --format='value(status.url)')
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}${{ inputs.smoke_test_path }}")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Rollback verified (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "WARNING: Rollback smoke test FAILED after 3 attempts"
          exit 1

      - name: Invalidate CDN cache
        if: inputs.cdn_host != '' && vars.CDN_URL_MAP != ''
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --host="${{ inputs.cdn_host }}" \
            --path="/*" \
            --project=${{ vars.GCP_PROJECT }} \
            --async

      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Rollback: ${{ inputs.service }} → ${{ inputs.version }}
          | | |
          |---|---|
          | Triggered by | @${{ github.actor }} |
          | Image | `${{ vars.AR_REPO }}/${{ inputs.service }}:${{ inputs.version }}` |
          | CDN Invalidation | ${{ inputs.cdn_host || 'skipped' }} |
          EOF
