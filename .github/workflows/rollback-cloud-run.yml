# =============================================================================
# REUSABLE WORKFLOW: ROLLBACK CLOUD RUN
# =============================================================================
# Two modes:
#
#   mode="previous" (default) → instant traffic shift to previous revision (~2s)
#                                Falls back to pro-previous AR tag if no revision available
#   mode="specific"           → deploy a specific image tag from AR
#
# Protected by a GitHub environment (approval gate). The environment name
# is passed via `inputs.environment` (default: "production") so repos that
# use e.g. "pro" can override without creating a duplicate environment.
#
# Destination: Dogfy-Diet/.github/.github/workflows/rollback-cloud-run.yml
#
# Required GitHub variables (on the chosen environment):
#   Repository level : AR_REPO
#   Per environment  : GCP_PROJECT, SA_EMAIL, WIF_PROVIDER
# =============================================================================
name: Rollback Cloud Run

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      environment:
        type: string
        default: "production"
        description: "GitHub environment (e.g. pro). Must match the environment where GCP_PROJECT / SA_EMAIL / WIF_PROVIDER / CDN_URL_MAP are declared."
      mode:
        type: string
        default: "previous"
        description: "'previous' = instant traffic shift to last revision, 'specific' = deploy a specific tag"
      version:
        type: string
        default: ""
        description: "Version to rollback to (only for mode=specific). Accepts: commit hash (b075fa6), semver (v1.3.2 or 1.3.2), or tag (sha-b075fa6, pro-previous)."
      region:
        type: string
        default: "europe-west1"
      smoke_test_path:
        type: string
        default: ""
      cdn_host:
        type: string
        default: ""
        description: "Host to invalidate CDN cache for. Requires CDN_URL_MAP GitHub env variable. Empty = skip."
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email. For monorepos with multiple services. Defaults to vars.SA_EMAIL if empty."

jobs:
  rollback:
    name: "Rollback ${{ inputs.service }} on ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.service }}-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # ================================================================
      # MODE: PREVIOUS — instant traffic shift
      # CURRENT  = revision serving 100% of untagged (production) traffic.
      # PREVIOUS = newest revision that is neither CURRENT nor currently
      #            pointed to by a tagged traffic entry (pr-* previews).
      # Without this filter, a leftover preview revision (--no-traffic,
      # tagged) would be the "newest", and rolling back traffic to it
      # would serve whatever the preview had.
      # ================================================================
      - name: Get current and previous revisions
        id: revisions
        if: inputs.mode == 'previous'
        run: |
          SERVICE_JSON=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='json' 2>/dev/null || echo '{}')

          CURRENT=$(echo "$SERVICE_JSON" \
            | jq -r '.status.traffic[] | select(.percent==100 and (.tag == null or .tag == "")) | .revisionName' \
            | head -1)

          # Revisions currently tagged (previews) — exclude them as candidates
          TAGGED=$(echo "$SERVICE_JSON" \
            | jq -r '.status.traffic[] | select(.tag != null and .tag != "") | .revisionName')

          # Walk revisions newest-first; first one that is neither CURRENT
          # nor TAGGED is our rollback target.
          PREVIOUS=""
          while IFS= read -r rev; do
            [ -z "$rev" ] && continue
            [ "$rev" = "$CURRENT" ] && continue
            if [ -n "$TAGGED" ] && printf '%s\n' "$TAGGED" | grep -qxF "$rev"; then
              continue
            fi
            PREVIOUS="$rev"
            break
          done < <(gcloud run revisions list \
            --service=${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='value(metadata.name)' \
            --sort-by='~metadata.creationTimestamp' 2>/dev/null || true)

          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "previous=${PREVIOUS}" >> "$GITHUB_OUTPUT"

          if [ -n "$PREVIOUS" ]; then
            echo "Found previous revision: $PREVIOUS (current: $CURRENT)"
          else
            echo "No previous revision found, will fall back to pro-previous tag"
          fi

      - name: Rollback via traffic shift
        id: traffic-shift
        if: inputs.mode == 'previous' && steps.revisions.outputs.previous != ''
        run: |
          echo "Shifting 100% traffic to ${{ steps.revisions.outputs.previous }}"
          gcloud run services update-traffic ${{ inputs.service }} \
            --to-revisions=${{ steps.revisions.outputs.previous }}=100 \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}
          echo "method=traffic-shift" >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_STEP_SUMMARY" <<RBEOF
          ### Rollback: ${{ inputs.service }} (traffic shift)
          | | |
          |---|---|
          | From | \`${{ steps.revisions.outputs.current }}\` |
          | To | \`${{ steps.revisions.outputs.previous }}\` |
          | Method | Instant traffic shift |
          RBEOF

      - name: Fallback — deploy pro-previous from AR
        id: fallback
        if: inputs.mode == 'previous' && steps.revisions.outputs.previous == ''
        run: |
          AR_IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"
          echo "No previous revision — deploying from pro-previous tag"

          DIGEST=$(gcloud artifacts docker images describe \
            "${AR_IMAGE}:pro-previous" \
            --format='value(image_summary.digest)' 2>/dev/null || true)

          if [ -z "$DIGEST" ]; then
            echo "::error::No previous revision and no pro-previous tag found in AR. Cannot rollback."
            exit 1
          fi

          echo "Deploying pro-previous (digest: ${DIGEST})"
          gcloud run deploy ${{ inputs.service }} \
            --image="${AR_IMAGE}@${DIGEST}" \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}
          echo "method=ar-redeploy" >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_STEP_SUMMARY" <<RBEOF
          ### Rollback: ${{ inputs.service }} (AR redeploy)
          | | |
          |---|---|
          | Tag | \`pro-previous\` |
          | Digest | \`${DIGEST}\` |
          | Method | Redeploy from Artifact Registry (no previous revision available) |
          RBEOF

      # ================================================================
      # MODE: SPECIFIC — deploy a specific tag
      # ================================================================
      - name: Validate and resolve version
        id: resolve-version
        if: inputs.mode == 'specific'
        run: |
          RAW="${{ inputs.version }}"
          if [ -z "$RAW" ]; then
            echo "::error::mode=specific requires a version input (e.g. b075fa6, v1.3.2, or 1.3.2)"
            exit 1
          fi

          # Normalize input → AR tag
          #   b075fa6 / b075fa6c3d9e...  → sha-b075fa6  (commit hash)
          #   1.3.2                       → v1.3.2       (semver without v)
          #   v1.3.2                      → v1.3.2       (semver with v)
          #   sha-b075fa6                 → sha-b075fa6  (already a tag)
          #   pro-previous                → as-is        (mutable tag)
          if echo "$RAW" | grep -qE '^[0-9a-f]{7,40}$'; then
            RESOLVED="sha-${RAW:0:7}"
          elif echo "$RAW" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            RESOLVED="v${RAW#v}"
          else
            RESOLVED="$RAW"
          fi

          echo "tag=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${RAW} → ${RESOLVED}"

      - name: Verify version exists in AR
        id: verify
        if: inputs.mode == 'specific'
        run: |
          TAG="${{ steps.resolve-version.outputs.tag }}"
          IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}:${TAG}"
          echo "Checking $IMAGE ..."
          DIGEST=$(gcloud artifacts docker images describe "$IMAGE" \
            --format='value(image_summary.digest)' 2>/dev/null || true)

          if [ -z "$DIGEST" ]; then
            echo "::error::Version ${TAG} not found in Artifact Registry"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Found: $IMAGE (digest: ${DIGEST})"

      - name: Deploy specific version
        id: specific-deploy
        if: inputs.mode == 'specific'
        env:
          RESOLVED_TAG: ${{ steps.resolve-version.outputs.tag }}
        run: |
          AR_IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"
          echo "Rolling back to: ${RESOLVED_TAG}"
          gcloud run deploy ${{ inputs.service }} \
            --image="${AR_IMAGE}@${{ steps.verify.outputs.digest }}" \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

          cat >> "$GITHUB_STEP_SUMMARY" <<RBEOF
          ### Rollback: ${{ inputs.service }} (specific version)
          | | |
          |---|---|
          | Tag | \`${RESOLVED_TAG}\` |
          | Digest | \`${{ steps.verify.outputs.digest }}\` |
          | Method | Deploy specific version from AR |
          RBEOF

      # `gcloud run deploy` does not shift traffic when the service already
      # has an explicit split (which is exactly the state left by a prior
      # auto-rollback or manual pin). Both the specific-mode deploy above
      # and the fallback AR redeploy below create a new revision that
      # silently receives 0% traffic unless we explicitly route to latest.
      - name: Route traffic to latest revision
        if: steps.specific-deploy.outcome == 'success' || steps.fallback.outcome == 'success'
        run: |
          gcloud run services update-traffic ${{ inputs.service }} \
            --to-latest \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      # ================================================================
      # SMOKE TEST (both modes)
      # ================================================================
      - name: Smoke test
        if: inputs.smoke_test_path != ''
        run: |
          if [ -n "${{ inputs.cdn_host }}" ]; then
            URL="https://${{ inputs.cdn_host }}"
          else
            URL=$(gcloud run services describe ${{ inputs.service }} \
              --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} \
              --format='value(status.url)')
          fi
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}${{ inputs.smoke_test_path }}")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Rollback verified (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "WARNING: Rollback smoke test FAILED after 3 attempts"
          exit 1

      # ================================================================
      # CDN INVALIDATION (both modes) — only on success
      # ================================================================
      - name: Invalidate CDN cache
        if: success() && inputs.cdn_host != '' && vars.CDN_URL_MAP != ''
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --host="${{ inputs.cdn_host }}" \
            --path="/*" \
            --project=${{ vars.GCP_PROJECT }} \
            --async

      # ================================================================
      # REGISTER GITHUB DEPLOYMENT
      # ================================================================
      - name: Register deployment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.sha }}
        run: |
          if [ -n "${{ inputs.cdn_host }}" ]; then
            ENV_URL="https://${{ inputs.cdn_host }}"
          else
            ENV_URL=$(gcloud run services describe ${{ inputs.service }} \
              --region=${{ inputs.region }} --project=${{ vars.GCP_PROJECT }} \
              --format='value(status.url)')
          fi

          DESCRIPTION="Rollback ${{ inputs.service }} (mode=${{ inputs.mode }})"
          if [ "${{ inputs.mode }}" = "specific" ]; then
            DESCRIPTION="Rollback ${{ inputs.service }} to ${{ inputs.version }}"
          fi

          # required_contexts: [] so the deployment isn't rejected by failing
          # commit status checks. gh api's -f/-F can't encode an empty JSON
          # array — build the body with jq and feed via --input.
          DEPLOY_ID=$(jq -n \
            --arg ref "$REF" \
            --arg env "${{ inputs.environment }}" \
            --arg desc "$DESCRIPTION" \
            '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}' \
            | gh api repos/${{ github.repository }}/deployments --input - --jq '.id')
          gh api repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses \
            -f state=success \
            -f environment_url="${ENV_URL}" \
            -f description="${DESCRIPTION}"

      # ================================================================
      # FINAL SUMMARY
      # ================================================================
      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ---
          | | |
          |---|---|
          | Triggered by | @${{ github.actor }} |
          | Mode | `${{ inputs.mode }}` |
          | CDN Invalidation | ${{ inputs.cdn_host || 'skipped' }} |
          EOF
