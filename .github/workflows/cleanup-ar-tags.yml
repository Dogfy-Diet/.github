# =============================================================================
# REUSABLE WORKFLOW: CLEANUP AR TAGS
# =============================================================================
# Removes old sha-* image tags from Artifact Registry, keeping the most
# recent N tags per service. Prevents unbounded tag accumulation.
#
# Call this on a weekly schedule from each repo.
#
# Destination: Dogfy-Diet/.github/.github/workflows/cleanup-ar-tags.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO
#   Environment "stg": SA_EMAIL (or pass sa_email input), WIF_PROVIDER
#
# Protected tags (never deleted):
#   stg-latest, pro-latest, pro-previous, v*.*.*, buildcache
# =============================================================================
name: Cleanup AR Tags

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Image name in AR (e.g. dogfy-backoffice)"
      keep_last:
        type: number
        default: 10
        description: "Number of recent sha-* tags to keep"
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email override. Defaults to vars.SA_EMAIL."
      region:
        type: string
        default: "europe-west1"

jobs:
  cleanup:
    name: "Prune stale AR tags"
    runs-on: ubuntu-latest
    environment: stg
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Cleanup old sha-* tags
        run: |
          IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"
          KEEP=${{ inputs.keep_last }}

          echo "Listing images for $IMAGE (by createTime desc) ..."
          # Output: createTime|digest|tag1,tag2,...
          IMAGES=$(gcloud artifacts docker images list "$IMAGE" \
            --include-tags \
            --format="csv[no-heading,separator=|](createTime,version,tags)" \
            --sort-by=~createTime 2>/dev/null || true)

          if [ -z "$IMAGES" ]; then
            echo "No images found"
            exit 0
          fi

          # Walk newest → oldest, count images that carry any sha-* tag.
          # Beyond KEEP, delete every sha-* tag on that image. Protected
          # tags (pro-latest, pro-previous, stg-latest, v*, buildcache)
          # stay because we only ever delete tags matching sha-*.
          count_with_sha=0
          deleted=0

          while IFS='|' read -r _CREATED DIGEST TAGS; do
            [ -z "$TAGS" ] && continue
            # Does this image have any sha-* tag?
            HAS_SHA=false
            IFS=',' read -r -a TAG_ARR <<< "$TAGS"
            for T in "${TAG_ARR[@]}"; do
              case "$T" in
                sha-*) HAS_SHA=true; break;;
              esac
            done
            [ "$HAS_SHA" = false ] && continue

            count_with_sha=$((count_with_sha + 1))
            if [ "$count_with_sha" -le "$KEEP" ]; then
              continue
            fi

            # Image is older than the KEEP newest — prune its sha-* tags.
            for T in "${TAG_ARR[@]}"; do
              case "$T" in
                sha-*)
                  echo "Deleting tag: $T (image created before the last $KEEP sha-* builds)"
                  if gcloud artifacts docker tags delete "$IMAGE:$T" --quiet 2>/dev/null; then
                    deleted=$((deleted + 1))
                  fi
                  ;;
              esac
            done
          done <<< "$IMAGES"

          echo "Kept the last $KEEP images carrying sha-* tags; deleted $deleted older sha-* tags."

      - name: Cleanup untagged images
        run: |
          IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}"

          echo "Checking for untagged images ..."
          UNTAGGED=$(gcloud artifacts docker images list "$IMAGE" \
            --include-tags --filter="tags=''" \
            --format='value(version)' 2>/dev/null || true)

          if [ -z "$UNTAGGED" ]; then
            echo "No untagged images found"
            exit 0
          fi

          COUNT=$(echo "$UNTAGGED" | grep -c . || true)
          echo "Found $COUNT untagged images, deleting ..."

          for VERSION in $UNTAGGED; do
            gcloud artifacts docker images delete "$IMAGE@$VERSION" \
              --quiet --delete-tags 2>/dev/null || true
          done

          echo "Cleaned up $COUNT untagged images"

      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ### AR Cleanup: ${{ inputs.service }}
          Removed old `sha-*` tags and untagged images (kept last ${{ inputs.keep_last }}).
          EOF
