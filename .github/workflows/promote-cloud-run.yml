# =============================================================================
# REUSABLE WORKFLOW: PROMOTE TO PRODUCTION
# =============================================================================
# Promotes an existing image from AR to production. No build — just deploy
# by digest, then move tags on success.
#
# Digest-first flow:
#   1. Resolve user input → source tag → source digest (ONCE, upfront)
#   2. Capture current pro-latest digest (for pro-previous backup on success)
#   3. Capture currently-serving Cloud Run revision (for auto-rollback)
#   4. Deploy Cloud Run by digest (tags are not touched yet)
#   5. Smoke test
#   6. Only on success: move pro-latest, pro-previous, and semver tags.
#   7. On failure: shift Cloud Run traffic back to the saved revision;
#      tags remain untouched, so AR state == what's actually running.
#
# Why digest-first: between 'read stg-latest' and 'write pro-latest' a
# concurrent push to main can move stg-latest. Resolving to a digest up
# front and using it for deploy + later tag moves eliminates that race.
#
# The version input accepts:
#   - Commit hash (b075fa6 / full 40-char) → sha-b075fa6
#   - Semver (1.4.0 / v1.4.0) → source is stg-latest, tagged as v1.4.0
#                               on success
#   - AR tag (sha-b075fa6, stg-latest, pro-previous) → used as-is
#
# Features:
#   - Pre-deploy context: shows source vs production image comparison
#   - Smoke test with auto-rollback on any post-deploy failure
#   - CDN cache invalidation
#   - GitHub Deployments API: registers each deploy for traceability
#
# For staging builds, use deploy-cloud-run.yml instead.
#
# Destination: Dogfy-Diet/.github/.github/workflows/promote-cloud-run.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO      (e.g. europe-west1-docker.pkg.dev/dogfy-host/docker)
#   Per environment  : GCP_PROJECT  (e.g. dogfy-platform-pro)
#                      SA_EMAIL     (deployer SA for this service)
#                      WIF_PROVIDER (WIF provider full resource name)
# =============================================================================
name: Promote to Production

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Cloud Run service name (must match Terraform)"
      version:
        required: true
        type: string
        description: "Version to promote. Accepts: commit hash (b075fa6), semver (v1.4.0 or 1.4.0), tag (stg-latest, sha-b075fa6)."
      environment:
        type: string
        default: "production"
        description: "GitHub environment. Defaults to production."
      region:
        type: string
        default: "europe-west1"
      smoke_test_path:
        type: string
        default: ""
        description: "Health check path (e.g. /health). Empty = skip."
      cdn_host:
        type: string
        default: ""
        description: "Host to invalidate CDN cache for. Requires CDN_URL_MAP GitHub env variable. Empty = skip."
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email. For monorepos with multiple services. Defaults to vars.SA_EMAIL if empty."
    outputs:
      image:
        value: ${{ jobs.promote.outputs.image }}
      digest:
        value: ${{ jobs.promote.outputs.digest }}
      url:
        value: ${{ jobs.promote.outputs.url }}

jobs:
  promote:
    name: "Promote to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.service }}-${{ inputs.environment }}
      cancel-in-progress: false
    outputs:
      image: ${{ steps.src.outputs.ar_image }}
      digest: ${{ steps.src.outputs.digest }}
      url: ${{ steps.url.outputs.url }}
    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:
      # ================================================================
      # AUTH
      # ================================================================
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # ================================================================
      # RESOLVE VERSION — NORMALIZE USER INPUT TO A SOURCE TAG
      # Semver is a SHORTCUT meaning "promote whatever is currently on
      # staging, and also label the image with this version number".
      #   b075fa6 / b075fa6c3d9e...  → src_tag=sha-b075fa6    is_semver=false
      #   1.4.0 / v1.4.0             → src_tag=stg-latest     is_semver=true  semver_tag=v1.4.0
      #   sha-b075fa6                → src_tag=sha-b075fa6    is_semver=false
      #   stg-latest / pro-previous  → src_tag=<as-is>        is_semver=false
      # ================================================================
      - name: Resolve version
        id: version
        run: |
          RAW="${{ inputs.version }}"

          if echo "$RAW" | grep -qE '^[0-9a-f]{7,40}$'; then
            SRC_TAG="sha-${RAW:0:7}"
            IS_SEMVER=false
            SEMVER_TAG=""
          elif echo "$RAW" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            SRC_TAG="stg-latest"
            IS_SEMVER=true
            SEMVER_TAG="v${RAW#v}"
          else
            SRC_TAG="$RAW"
            IS_SEMVER=false
            SEMVER_TAG=""
          fi

          echo "src_tag=${SRC_TAG}" >> "$GITHUB_OUTPUT"
          echo "is_semver=${IS_SEMVER}" >> "$GITHUB_OUTPUT"
          echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved: input='${RAW}' → src_tag=${SRC_TAG} is_semver=${IS_SEMVER} semver_tag=${SEMVER_TAG:-none}"

      # ================================================================
      # RESOLVE SOURCE DIGEST (SINGLE SOURCE OF TRUTH)
      # From here on, everything operates on digests, never on mutable
      # tags — so that a concurrent push to main that moves `stg-latest`
      # between steps cannot affect this promote.
      # ================================================================
      - name: Resolve source digest
        id: src
        env:
          AR_IMAGE: ${{ vars.AR_REPO }}/${{ inputs.service }}
          SRC_TAG: ${{ steps.version.outputs.src_tag }}
        run: |
          SRC_DIGEST=$(gcloud artifacts docker images describe \
            "${AR_IMAGE}:${SRC_TAG}" \
            --format='value(image_summary.digest)' 2>/dev/null)
          if [ -z "$SRC_DIGEST" ]; then
            echo "::error::Source tag ${SRC_TAG} not found in AR"
            exit 1
          fi
          echo "ar_image=${AR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${SRC_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Source: ${AR_IMAGE}:${SRC_TAG} @ ${SRC_DIGEST}"

      # ================================================================
      # CAPTURE CURRENT PRO-LATEST DIGEST
      # Saved now (not moved) so pro-previous only advances after a
      # successful deploy. If the promote fails, pro-latest is untouched
      # and this workflow can be safely re-run.
      # ================================================================
      - name: Capture current pro-latest digest
        id: prev
        env:
          AR_IMAGE: ${{ steps.src.outputs.ar_image }}
        run: |
          PREV_DIGEST=$(gcloud artifacts docker images describe \
            "${AR_IMAGE}:pro-latest" \
            --format='value(image_summary.digest)' 2>/dev/null || true)
          echo "digest=${PREV_DIGEST}" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV_DIGEST" ]; then
            echo "Current pro-latest: ${PREV_DIGEST}"
          else
            echo "No existing pro-latest (first promote for this service)"
          fi

      # ================================================================
      # PRE-DEPLOY CONTEXT — visible to approval reviewers
      # ================================================================
      - name: Pre-deploy context
        env:
          AR_IMAGE: ${{ steps.src.outputs.ar_image }}
          SRC_DIGEST: ${{ steps.src.outputs.digest }}
          PREV_DIGEST: ${{ steps.prev.outputs.digest }}
          SRC_TAG: ${{ steps.version.outputs.src_tag }}
        run: |
          # Find the sha-* tag that matches each digest (for human-readable context)
          find_sha_tag() {
            local digest="$1"
            [ -z "$digest" ] && echo "(none)" && return
            for img in $(gcloud artifacts docker images list "${AR_IMAGE}" \
              --include-tags --filter="digest=${digest}" \
              --format='value(tags)' 2>/dev/null); do
              SHA=$(echo "$img" | tr ',' '\n' | grep "^sha-" | head -1)
              [ -n "$SHA" ] && echo "$SHA" && return
            done
            echo "${SRC_TAG}"
          }

          SRC_SHA=$(find_sha_tag "$SRC_DIGEST")
          PRO_SHA=$(find_sha_tag "$PREV_DIGEST")

          SYNC_STATUS=""
          if [ "$SRC_DIGEST" = "$PREV_DIGEST" ] && [ -n "$SRC_DIGEST" ]; then
            SYNC_STATUS="| **Status** | Already in sync |"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<CTXEOF
          ### Pre-deploy Context
          | Environment | Image Tag | Digest |
          |---|---|---|
          | Source | \`${SRC_SHA}\` | \`${SRC_DIGEST:0:19}...\` |
          | Production | \`${PRO_SHA}\` | \`${PREV_DIGEST:0:19}...\` |

          ${SYNC_STATUS}

          **Promoting \`${SRC_SHA}\` → production** (replacing \`${PRO_SHA}\`)
          CTXEOF

      # ================================================================
      # SAVE CURRENTLY-SERVING REVISION (for auto-rollback on failure)
      # Uses the traffic split, not just the newest revision — preview
      # deploys create newer revisions with 0% traffic.
      # ================================================================
      - name: Save currently-serving revision
        id: pre-deploy
        run: |
          REVISION=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='json' 2>/dev/null \
            | jq -r '.status.traffic[] | select(.percent==100 and (.tag == null or .tag == "")) | .revisionName' \
            | head -1 || true)
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "Serving revision before deploy: ${REVISION:-none}"

      # ================================================================
      # DEPLOY (always by digest — tags remain unchanged until success)
      # ================================================================
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service }} \
            --image=${{ steps.src.outputs.ar_image }}@${{ steps.src.outputs.digest }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Get service URL
        id: url
        run: |
          if [ -n "${{ inputs.cdn_host }}" ]; then
            echo "url=https://${{ inputs.cdn_host }}" >> "$GITHUB_OUTPUT"
          else
            URL=$(gcloud run services describe ${{ inputs.service }} \
              --region=${{ inputs.region }} \
              --project=${{ vars.GCP_PROJECT }} \
              --format='value(status.url)')
            echo "url=${URL}" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # SMOKE TEST
      # ================================================================
      - name: Smoke test
        id: smoke
        if: inputs.smoke_test_path != ''
        run: |
          URL="${{ steps.url.outputs.url }}${{ inputs.smoke_test_path }}"
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "Smoke test FAILED after 3 attempts"
          exit 1

      # ================================================================
      # ATOMIC TAG MOVES — only after deploy + smoke success
      # Every operation below references the digests resolved upfront, so
      # nothing we touch depends on mutable tags that might have moved.
      #   pro-previous → old pro-latest digest (if one existed)
      #   pro-latest   → new src digest
      #   v1.x.x       → new src digest (when promoting a semver)
      # ================================================================
      - name: Move AR tags (pro-latest, pro-previous, semver)
        if: success()
        env:
          AR_IMAGE: ${{ steps.src.outputs.ar_image }}
          SRC_DIGEST: ${{ steps.src.outputs.digest }}
          PREV_DIGEST: ${{ steps.prev.outputs.digest }}
          IS_SEMVER: ${{ steps.version.outputs.is_semver }}
          SEMVER_TAG: ${{ steps.version.outputs.semver_tag }}
        run: |
          if [ -n "$PREV_DIGEST" ]; then
            echo "Moving pro-previous → ${PREV_DIGEST}"
            gcloud artifacts docker tags add "${AR_IMAGE}@${PREV_DIGEST}" "${AR_IMAGE}:pro-previous"
          fi

          echo "Moving pro-latest → ${SRC_DIGEST}"
          gcloud artifacts docker tags add "${AR_IMAGE}@${SRC_DIGEST}" "${AR_IMAGE}:pro-latest"

          if [ "$IS_SEMVER" = "true" ]; then
            echo "Creating ${SEMVER_TAG} → ${SRC_DIGEST}"
            gcloud artifacts docker tags add "${AR_IMAGE}@${SRC_DIGEST}" "${AR_IMAGE}:${SEMVER_TAG}"
          fi

      # ================================================================
      # AUTO-ROLLBACK — any failure from deploy onwards
      # Tags weren't moved yet (the tag-move step runs only on success),
      # so AR is already in the correct pre-deploy state. Here we only
      # roll Cloud Run traffic back to the revision that was serving
      # before this promote started.
      # ================================================================
      - name: Auto-rollback
        if: failure() && steps.pre-deploy.outputs.revision != ''
        run: |
          echo "::warning::Promote failed — rolling back traffic to ${{ steps.pre-deploy.outputs.revision }}"
          gcloud run services update-traffic ${{ inputs.service }} \
            --to-revisions=${{ steps.pre-deploy.outputs.revision }}=100 \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      # ================================================================
      # CDN INVALIDATION
      # ================================================================
      - name: Invalidate CDN cache
        if: inputs.cdn_host != '' && vars.CDN_URL_MAP != ''
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --host="${{ inputs.cdn_host }}" \
            --path="/*" \
            --project=${{ vars.GCP_PROJECT }} \
            --async

      # ================================================================
      # REGISTER GITHUB DEPLOYMENT
      # ================================================================
      - name: Register deployment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.sha }}
          ENVIRONMENT: ${{ inputs.environment }}
          DESCRIPTION: "${{ inputs.service }} @${{ steps.src.outputs.digest }}"
          ENVIRONMENT_URL: ${{ steps.url.outputs.url }}
        run: |
          # required_contexts: [] so the promote isn't blocked by unrelated
          # commit status checks on the target SHA. gh api's -f/-F can't encode
          # an empty JSON array, so build the body with jq and feed via --input.
          DEPLOY_ID=$(jq -n \
            --arg ref "$REF" \
            --arg env "$ENVIRONMENT" \
            --arg desc "$DESCRIPTION" \
            '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}' \
            | gh api repos/${{ github.repository }}/deployments --input - --jq '.id')
          gh api repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses \
            -f state=success \
            -f environment_url="$ENVIRONMENT_URL" \
            -f description="$DESCRIPTION"

      # ================================================================
      # SUMMARY
      # ================================================================
      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### Promote: ${{ inputs.service }} → ${{ inputs.environment }}
          | | |
          |---|---|
          | Image | \`${{ steps.src.outputs.ar_image }}\` |
          | Digest | \`${{ steps.src.outputs.digest }}\` |
          | URL | ${{ steps.url.outputs.url }} |
          | Version input | \`${{ inputs.version }}\` |
          | Resolved source | \`${{ steps.version.outputs.src_tag }}\` |
          | Semver applied | ${{ steps.version.outputs.semver_tag || '(none)' }} |
          | CDN Invalidation | ${{ inputs.cdn_host || 'skipped' }} |
          EOF
