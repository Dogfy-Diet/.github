# =============================================================================
# REUSABLE WORKFLOW: VALIDATE
# =============================================================================
# Runs lint, typecheck, test, build, and security audit in parallel.
# Each step is optional — pass an empty string to skip it.
#
# By default all checks are blocking (strict). To make specific checks
# non-blocking (report as warning), list them in `non_strict_checks`.
#
# Destination: Dogfy-Diet/.github/.github/workflows/validate.yml
# =============================================================================
name: Validate

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "22"
      install_command:
        type: string
        default: "npm ci"
      lint_command:
        type: string
        default: "npm run lint"
        description: "Lint command. Empty = skip."
      typecheck_command:
        type: string
        default: ""
        description: "Typecheck command (e.g. npm run typecheck, npx vue-tsc --noEmit). Empty = skip."
      test_command:
        type: string
        default: "npm test"
        description: "Test command. Empty = skip."
      build_command:
        type: string
        default: "npm run build"
        description: "Build command. Empty = skip."
      audit_command:
        type: string
        default: "npm audit --audit-level=moderate"
        description: "Security audit command. Empty = skip."
      setup_command:
        type: string
        default: ""
        description: "Pre-step command after install (e.g. npx nuxt prepare). Runs before lint/typecheck/test/build."
      non_strict_checks:
        type: string
        default: "audit"
        description: "Comma-separated list of checks that are non-blocking (warning only). Options: lint, typecheck, test, build, audit. Default: 'audit'."
      submodules:
        type: string
        default: "false"
        description: "Fetch git submodules on checkout. 'true', 'recursive', or 'false'."
      cache_node_modules:
        type: boolean
        default: true
        description: "Cache node_modules across runs (key = package-lock.json hash)."
      cache_service_name:
        type: string
        default: "default"
        description: "Namespace for node_modules cache (useful for monorepos where multiple apps share this reusable)."
    secrets:
      submodules_token:
        required: false
        description: "PAT with read access to private submodule repos."

jobs:
  lint:
    name: Lint
    if: inputs.lint_command != ''
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Restore node_modules cache
        if: inputs.cache_node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-
      - run: ${{ inputs.install_command }}
      - if: inputs.setup_command != ''
        run: ${{ inputs.setup_command }}
      - name: Run lint
        id: run
        run: |
          STRICT=true
          if echo "${{ inputs.non_strict_checks }}" | grep -qw "lint"; then
            STRICT=false
          fi
          if ${{ inputs.lint_command }}; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            if [ "$STRICT" = "true" ]; then
              echo "status=failure" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "::warning::Lint issues found (non-blocking)"
              echo "status=warning" >> "$GITHUB_OUTPUT"
            fi
          fi

  typecheck:
    name: Typecheck
    if: inputs.typecheck_command != ''
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Restore node_modules cache
        if: inputs.cache_node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-
      - run: ${{ inputs.install_command }}
      - if: inputs.setup_command != ''
        run: ${{ inputs.setup_command }}
      - name: Run typecheck
        id: run
        run: |
          STRICT=true
          if echo "${{ inputs.non_strict_checks }}" | grep -qw "typecheck"; then
            STRICT=false
          fi
          if ${{ inputs.typecheck_command }}; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            if [ "$STRICT" = "true" ]; then
              echo "status=failure" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "::warning::Typecheck issues found (non-blocking)"
              echo "status=warning" >> "$GITHUB_OUTPUT"
            fi
          fi

  test:
    name: Test
    if: inputs.test_command != ''
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Restore node_modules cache
        if: inputs.cache_node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-
      - run: ${{ inputs.install_command }}
      - if: inputs.setup_command != ''
        run: ${{ inputs.setup_command }}
      - name: Run tests
        id: run
        run: |
          STRICT=true
          if echo "${{ inputs.non_strict_checks }}" | grep -qw "test"; then
            STRICT=false
          fi
          if ${{ inputs.test_command }}; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            if [ "$STRICT" = "true" ]; then
              echo "status=failure" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "::warning::Test issues found (non-blocking)"
              echo "status=warning" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    name: Build
    if: inputs.build_command != ''
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Restore node_modules cache
        if: inputs.cache_node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-
      - run: ${{ inputs.install_command }}
      - if: inputs.setup_command != ''
        run: ${{ inputs.setup_command }}
      - name: Run build
        id: run
        run: |
          STRICT=true
          if echo "${{ inputs.non_strict_checks }}" | grep -qw "build"; then
            STRICT=false
          fi
          if ${{ inputs.build_command }}; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            if [ "$STRICT" = "true" ]; then
              echo "status=failure" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "::warning::Build issues found (non-blocking)"
              echo "status=warning" >> "$GITHUB_OUTPUT"
            fi
          fi

  audit:
    name: Security audit
    if: inputs.audit_command != ''
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.run.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - name: Restore node_modules cache
        if: inputs.cache_node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.cache_service_name }}-
      - run: ${{ inputs.install_command }}
      - name: Run security audit
        id: run
        run: |
          STRICT=true
          if echo "${{ inputs.non_strict_checks }}" | grep -qw "audit"; then
            STRICT=false
          fi
          if ${{ inputs.audit_command }}; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            if [ "$STRICT" = "true" ]; then
              echo "status=failure" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "::warning::Security vulnerabilities found (non-blocking)"
              echo "status=warning" >> "$GITHUB_OUTPUT"
            fi
          fi

  # ===========================================================================
  # SUMMARY — aggregates results, only shows checks that ran
  # ===========================================================================
  summary:
    name: Summary
    if: always()
    needs: [lint, typecheck, test, build, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Validation summary
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              warning) echo "⚠️" ;;
              failure) echo "❌" ;;
              *)       echo "❓" ;;
            esac
          }

          NON_STRICT="${{ inputs.non_strict_checks }}"

          is_blocking() {
            if echo "$NON_STRICT" | grep -qw "$1"; then
              echo "No"
            else
              echo "Yes"
            fi
          }

          LINT="${{ needs.lint.outputs.status }}"
          TYPECHECK="${{ needs.typecheck.outputs.status }}"
          TEST="${{ needs.test.outputs.status }}"
          BUILD="${{ needs.build.outputs.status }}"
          AUDIT="${{ needs.audit.outputs.status }}"

          {
            echo "## Validation Results"
            echo ""
            echo "| Check | Status | Blocking |"
            echo "|-------|--------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          WARNINGS=0

          for check in lint typecheck test build audit; do
            STATUS=$(eval echo \$$(echo $check | tr '[:lower:]' '[:upper:]'))

            # Skip checks that didn't run (empty command)
            if [ -z "$STATUS" ]; then
              continue
            fi

            BLOCKING=$(is_blocking "$check")
            echo "| ${check^} | $(icon $STATUS) ${STATUS} | ${BLOCKING} |" >> "$GITHUB_STEP_SUMMARY"

            if [ "$STATUS" = "failure" ]; then
              FAILED=$((FAILED + 1))
            elif [ "$STATUS" = "warning" ]; then
              WARNINGS=$((WARNINGS + 1))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ $FAILED -gt 0 ]; then
            echo "❌ **$FAILED check(s) failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          elif [ $WARNINGS -gt 0 ]; then
            echo "⚠️ **Passed with $WARNINGS warning(s).** Review when possible." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **All checks passed.**" >> "$GITHUB_STEP_SUMMARY"
          fi
