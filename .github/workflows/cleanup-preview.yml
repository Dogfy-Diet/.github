# =============================================================================
# REUSABLE WORKFLOW: CLEANUP PREVIEW
# =============================================================================
# Removes the Cloud Run traffic tag and AR image tag for a closed PR.
# Called from the caller workflow on pull_request.closed events.
#
# Without this, stale previews linger until the next staging deploy.
# This gives immediate cleanup when a PR is closed or merged.
#
# Destination: Dogfy-Diet/.github/.github/workflows/cleanup-preview.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO
#   Environment "stg": GCP_PROJECT, SA_EMAIL, WIF_PROVIDER
# =============================================================================
name: Cleanup Preview

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      region:
        type: string
        default: "europe-west1"
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email. For monorepos with multiple services. Defaults to vars.SA_EMAIL if empty."

jobs:
  cleanup:
    name: "Cleanup PR preview"
    runs-on: ubuntu-latest
    environment: stg
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Remove traffic tag
        run: |
          TAG="pr-${{ github.event.pull_request.number }}"
          echo "Removing Cloud Run traffic tag: $TAG"
          if gcloud run services update-traffic ${{ inputs.service }} \
            --remove-tags="$TAG" \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} 2>/dev/null; then
            echo "Removed traffic tag $TAG"
          else
            echo "Traffic tag $TAG not found (already removed or never created)"
          fi

      - name: Delete preview image tag
        run: |
          TAG="pr-${{ github.event.pull_request.number }}"
          IMAGE="${{ vars.AR_REPO }}/${{ inputs.service }}:$TAG"
          echo "Deleting AR image tag: $IMAGE"
          if gcloud artifacts docker tags delete "$IMAGE" --quiet 2>/dev/null; then
            echo "Deleted image tag $TAG"
          else
            echo "Image tag $TAG not found (already deleted or never pushed)"
          fi

      - name: Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Cleanup: ${{ inputs.service }} PR #${{ github.event.pull_request.number }}
          Removed traffic tag and AR image tag for closed PR.
          EOF
