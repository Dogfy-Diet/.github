# =============================================================================
# REUSABLE WORKFLOW: PREVIEW CLOUD RUN
# =============================================================================
# Builds and deploys an ephemeral preview using Cloud Run traffic tags.
# The preview shares staging infra (DB, secrets) but receives no live traffic.
#
# Destination: Dogfy-Diet/.github/.github/workflows/preview-cloud-run.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO      (e.g. europe-west1-docker.pkg.dev/dogfy-host/docker)
#   Environment "stg": GCP_PROJECT  (e.g. dogfy-platform-stg)
#                      SA_EMAIL     (deployer SA for this service)
#                      WIF_PROVIDER (WIF provider full resource name)
#
# Infra prerequisites:
#   - Cloud Run service must have ingress = INGRESS_TRAFFIC_ALL (staging only)
#     so the tagged URL https://pr-N---service.a.run.app is reachable.
#   - Deployer SA needs roles/artifactregistry.writer on the AR_REPO project.
#   - Cloud Run service agent needs roles/artifactregistry.reader on AR_REPO project.
# =============================================================================
name: Preview Cloud Run

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Cloud Run service name (must match Terraform, e.g. dogfy-new-help-center)"
      region:
        type: string
        default: "europe-west1"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      build_args:
        type: string
        default: ""
      # Prebuild steps (opt-in). Set these only if the Dockerfile expects
      # pre-built artifacts (e.g. npm run build output) in the build context.
      # If the Dockerfile is self-contained (multi-stage), leave empty.
      node_version:
        type: string
        default: ""
      install_command:
        type: string
        default: ""
      build_command:
        type: string
        default: ""
      smoke_test_path:
        type: string
        default: ""
        description: "Health check path for preview (e.g. /health). Empty = skip."
    outputs:
      preview_url:
        value: ${{ jobs.preview.outputs.url }}

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: stg
    concurrency:
      group: preview-${{ inputs.service }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      url: ${{ steps.preview-url.outputs.url }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # -- Optional prebuild ------------------------------------------------
      - uses: actions/setup-node@v4
        if: inputs.node_version != ''
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - if: inputs.install_command != ''
        run: ${{ inputs.install_command }}

      - if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

      # -- Auth (WIF) -------------------------------------------------------
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      # -- Build & push to centralized AR -----------------------------------
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ vars.AR_REPO }}/${{ inputs.service }}:pr-${{ github.event.pull_request.number }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # -- Deploy as tagged revision (no traffic) ---------------------------
      - name: Deploy preview
        run: |
          gcloud run deploy ${{ inputs.service }} \
            --image=${{ vars.AR_REPO }}/${{ inputs.service }}:pr-${{ github.event.pull_request.number }} \
            --tag=pr-${{ github.event.pull_request.number }} \
            --no-traffic \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Get preview URL
        id: preview-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='value(status.url)')
          URL=$(echo "$SERVICE_URL" | sed "s|https://|https://pr-${{ github.event.pull_request.number }}---|")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test preview
        if: inputs.smoke_test_path != ''
        run: |
          URL="${{ steps.preview-url.outputs.url }}${{ inputs.smoke_test_path }}"
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Preview smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "::warning::Preview smoke test failed (last HTTP $STATUS) — preview may need a moment to start"

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Preview deployed
            | | |
            |---|---|
            | Service | `${{ inputs.service }}` |
            | URL | ${{ steps.preview-url.outputs.url }} |
            | Commit | `${{ github.sha }}` |

            > Preview shares staging infra (DB, secrets). No production traffic.
