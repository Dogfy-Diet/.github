# =============================================================================
# REUSABLE WORKFLOW: PREVIEW CLOUD RUN
# =============================================================================
# Builds and deploys an ephemeral preview using Cloud Run traffic tags.
# The preview shares staging infra (DB, secrets) but receives no live traffic.
#
# Destination: Dogfy-Diet/.github/.github/workflows/preview-cloud-run.yml
#
# Required GitHub variables:
#   Repository level : AR_REPO      (e.g. europe-west1-docker.pkg.dev/dogfy-host/docker)
#   Environment "stg": GCP_PROJECT  (e.g. dogfy-platform-stg)
#                      SA_EMAIL     (deployer SA for this service)
#                      WIF_PROVIDER (WIF provider full resource name)
#
# Infra prerequisites:
#   - Cloud Run service must have ingress = INGRESS_TRAFFIC_ALL (staging only)
#     so the tagged URL https://pr-N---service.a.run.app is reachable.
#   - Deployer SA needs roles/artifactregistry.writer on the AR_REPO project.
#   - Cloud Run service agent needs roles/artifactregistry.reader on AR_REPO project.
# =============================================================================
name: Preview Cloud Run

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Cloud Run service name (must match Terraform, e.g. dogfy-new-help-center)"
      region:
        type: string
        default: "europe-west1"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      build_args:
        type: string
        default: ""
      # Prebuild steps (opt-in). Set these only if the Dockerfile expects
      # pre-built artifacts (e.g. npm run build output) in the build context.
      # If the Dockerfile is self-contained (multi-stage), leave empty.
      node_version:
        type: string
        default: ""
      install_command:
        type: string
        default: ""
      build_command:
        type: string
        default: ""
      smoke_test_path:
        type: string
        default: ""
        description: "Health check path for preview (e.g. /health). Empty = skip."
      sa_email:
        type: string
        default: ""
        description: "Deployer SA email. For monorepos with multiple services. Defaults to vars.SA_EMAIL if empty."
      submodules:
        type: string
        default: "false"
        description: "Fetch git submodules on checkout. 'true', 'recursive', or 'false'. For private submodules, also pass submodules_token."
      cache_node_modules:
        type: boolean
        default: true
        description: "Cache node_modules across runs (key = package-lock.json hash). Ignored if install_command is empty."
      build_cache_path:
        type: string
        default: ""
        description: "Directory to cache across runs for incremental builds (e.g. 'apps/website/.nuxt'). Keyed by service + PR number."
      env_vars:
        type: string
        default: ""
        description: |
          Multiline KEY=VALUE env vars exposed to the install/build steps.
          App-specific — use for stub values required by framework init
          during `nuxt build` and similar.
    secrets:
      submodules_token:
        required: false
        description: "PAT with read access to private submodule repos. Only needed when submodules live in private repos the GITHUB_TOKEN cannot reach."
    outputs:
      preview_url:
        value: ${{ jobs.preview.outputs.url }}

jobs:
  preview:
    name: "Deploy PR preview"
    runs-on: ubuntu-latest
    environment: stg
    concurrency:
      group: preview-${{ inputs.service }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      url: ${{ steps.preview-url.outputs.url }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Fetch private submodules separately so the main checkout keeps using
      # GITHUB_TOKEN and the PAT only authorizes the submodule fetch.
      - name: Fetch submodules
        if: inputs.submodules == 'true' || inputs.submodules == 'recursive'
        env:
          SUBMODULE_TOKEN: ${{ secrets.submodules_token || github.token }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ "${{ inputs.submodules }}" = "recursive" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init
          fi
          git config --global --unset url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf

      # -- Optional prebuild ------------------------------------------------
      - uses: actions/setup-node@v4
        if: inputs.node_version != ''
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Restore node_modules cache
        if: inputs.install_command != '' && inputs.cache_node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-nm-${{ inputs.service }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-${{ inputs.service }}-

      - name: Load app-specific env vars
        if: inputs.env_vars != ''
        run: |
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            case "$line" in \#*) continue ;; esac
            echo "$line" >> "$GITHUB_ENV"
          done <<< "${{ inputs.env_vars }}"

      - if: inputs.install_command != ''
        run: ${{ inputs.install_command }}

      - name: Restore build cache
        if: inputs.build_cache_path != ''
        uses: actions/cache@v4
        with:
          path: ${{ inputs.build_cache_path }}
          key: ${{ runner.os }}-build-${{ inputs.service }}-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ inputs.service }}-pr-${{ github.event.pull_request.number }}-
            ${{ runner.os }}-build-${{ inputs.service }}-

      - if: inputs.build_command != ''
        env:
          # Exposed for builds that need to fetch private resources (e.g.
          # @nuxt/content's repository source pulling a private submodule).
          # Reuses the same PAT the caller passes via `submodules_token`.
          GITHUB_API_TOKEN: ${{ secrets.submodules_token }}
        run: ${{ inputs.build_command }}

      # -- Auth (WIF) -------------------------------------------------------
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.sa_email || vars.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      # -- Build & push to centralized AR -----------------------------------
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ vars.AR_REPO }}/${{ inputs.service }}:pr-${{ github.event.pull_request.number }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=registry,ref=${{ vars.AR_REPO }}/${{ inputs.service }}:buildcache
          cache-to: type=registry,ref=${{ vars.AR_REPO }}/${{ inputs.service }}:buildcache,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # -- Deploy as tagged revision (no traffic) ---------------------------
      - name: Deploy preview
        run: |
          gcloud run deploy ${{ inputs.service }} \
            --image=${{ vars.AR_REPO }}/${{ inputs.service }}:pr-${{ github.event.pull_request.number }} \
            --tag=pr-${{ github.event.pull_request.number }} \
            --no-traffic \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }}

      - name: Get preview URL
        id: preview-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service }} \
            --region=${{ inputs.region }} \
            --project=${{ vars.GCP_PROJECT }} \
            --format='value(status.url)')
          URL=$(echo "$SERVICE_URL" | sed "s|https://|https://pr-${{ github.event.pull_request.number }}---|")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test preview
        if: inputs.smoke_test_path != ''
        run: |
          URL="${{ steps.preview-url.outputs.url }}${{ inputs.smoke_test_path }}"
          for i in 1 2 3; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Preview smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
          done
          echo "::warning::Preview smoke test failed (last HTTP $STATUS) — preview may need a moment to start"

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Preview deployed
            | | |
            |---|---|
            | Service | `${{ inputs.service }}` |
            | URL | ${{ steps.preview-url.outputs.url }} |
            | Commit | `${{ github.sha }}` |

            > Preview shares staging infra (DB, secrets). No production traffic.
